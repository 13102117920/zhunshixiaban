<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>准时下班 · 注册</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:{50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a'}}}}}</script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <span class="text-2xl">⏰</span>
        <p class="font-extrabold text-brand-700 text-lg leading-none">准时下班</p>
      </a>
      <div id="navRight"></div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-200 p-7">
      <h1 class="text-2xl font-extrabold text-slate-900">注册账号</h1>
      <p class="text-sm text-slate-500 mt-1">双休是底线，休三是加分。注册后选择你是招聘还是求职。</p>

      <div id="step1" class="mt-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">手机号</label>
          <input id="phone" type="tel" inputmode="numeric" maxlength="11" placeholder="11位手机号"
            class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">密码（至少6位）</label>
          <input id="pwd" type="password" placeholder="设置登录密码"
            class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" />
        </div>
        <p id="err1" class="text-sm text-red-500 hidden"></p>
        <button id="toRole" class="w-full rounded-xl bg-brand-600 text-white font-bold py-3 hover:bg-brand-700 transition">下一步：选择身份</button>
        <p class="text-center text-sm text-slate-400">已有账号？<a href="login.html" class="text-brand-600 font-medium">直接登录</a></p>
      </div>

      <div id="step2" class="mt-6 hidden">
        <p class="text-sm font-medium text-slate-700 mb-3">你是来做什么的？</p>
        <div class="grid grid-cols-2 gap-3">
          <button data-role="recruiter" class="role-btn rounded-xl border-2 border-slate-200 px-4 py-6 text-center hover:border-brand-400 transition">
            <div class="text-3xl mb-2">🏢</div>
            <p class="font-bold text-slate-900">我是企业</p>
            <p class="text-xs text-slate-500 mt-1">发布合规职位</p>
          </button>
          <button data-role="seeker" class="role-btn rounded-xl border-2 border-slate-200 px-4 py-6 text-center hover:border-brand-400 transition">
            <div class="text-3xl mb-2">🔍</div>
            <p class="font-bold text-slate-900">我是求职者</p>
            <p class="text-xs text-slate-500 mt-1">找份正经工作</p>
          </button>
        </div>
        <p id="err2" class="text-sm text-red-500 hidden mt-3"></p>
        <button id="finish" class="mt-4 w-full rounded-xl bg-brand-600 text-white font-bold py-3 hover:bg-brand-700 transition">完成注册</button>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    renderNav();
    let tmp = {};
    document.getElementById('toRole').addEventListener('click', () => {
      const r = registerUser(document.getElementById('phone').value, document.getElementById('pwd').value);
      if (!r.ok) { const e=document.getElementById('err1'); e.textContent=r.msg; e.classList.remove('hidden'); return; }
      tmp = r.user; setSession({ phone: r.user.phone, role: null, loginAt: Date.now() });
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.remove('hidden');
    });
    let picked = null;
    document.querySelectorAll('.role-btn').forEach(b => {
      b.addEventListener('click', () => {
        picked = b.dataset.role;
        document.querySelectorAll('.role-btn').forEach(x => x.classList.remove('border-brand-500','bg-brand-50'));
        b.classList.add('border-brand-500','bg-brand-50');
        document.getElementById('err2').classList.add('hidden');
      });
    });
    document.getElementById('finish').addEventListener('click', () => {
      if (!picked) { const e=document.getElementById('err2'); e.textContent='请选择身份'; e.classList.remove('hidden'); return; }
      setRole(picked);
      location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
