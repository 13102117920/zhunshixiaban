<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>准时下班 · 找份正经工作</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:{50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a'}}}}}</script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <span class="text-2xl">⏰</span>
        <div><p class="font-extrabold text-brand-700 text-lg leading-none">准时下班</p>
        <p class="text-[11px] text-slate-400 leading-none mt-0.5">双休是底线，休三是加分</p></div>
      </div>
      <div id="navRight"></div>
    </div>
  </header>

  <div class="bg-brand-600 text-white">
    <div class="max-w-6xl mx-auto px-4 py-8">
      <h1 class="text-2xl md:text-3xl font-extrabold">拒绝垃圾公司消耗，找份正经工作</h1>
      <p class="mt-2 text-brand-100 text-sm md:text-base">不画饼，不PUA，按时发薪准点走。来这儿找的，都是守规矩的正经工作。</p>
      <div class="mt-5 flex flex-col sm:flex-row gap-3 max-w-2xl">
        <input id="searchInput" type="text" placeholder="搜索职位 / 公司 / 城市…"
          class="flex-1 rounded-xl px-4 py-3 text-slate-800 text-sm outline-none focus:ring-2 focus:ring-white/70" />
      </div>
    </div>
  </div>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex flex-col md:flex-row gap-6">
      <aside class="md:w-72 shrink-0">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sticky top-20">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-bold text-slate-900">筛选条件</h2>
            <button id="clearBtn" class="text-xs text-brand-600 hover:text-brand-800">清空</button>
          </div>
          <div class="mb-5">
            <p class="text-xs font-bold text-red-600 uppercase tracking-wide mb-2">基础合规筛选</p>
            <div id="filterMandatory" class="space-y-2"></div>
          </div>
          <div>
            <p class="text-xs font-bold text-brand-600 uppercase tracking-wide mb-2">外企福利筛选</p>
            <div id="filterBenefit" class="space-y-2"></div>
          </div>
          <p id="resultCount" class="mt-4 text-xs text-slate-400"></p>
        </div>
      </aside>

      <section class="flex-1">
        <div id="jobList" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></div>
        <p id="emptyTip" class="hidden text-center text-slate-400 py-16">没有匹配的正经工作，试试减少筛选条件～</p>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    renderNav();
    const selectedFilters = new Set();
    let ALL_JOBS = [];
    const activeTags = (job) => [...(job.mandatory||[]), ...(job.benefits||[])];

    function renderFilter(list, containerId) {
      const c = document.getElementById(containerId);
      list.forEach(label => {
        const wrap = document.createElement('label');
        wrap.className = 'flex items-center gap-2 text-sm text-slate-600 cursor-pointer select-none hover:text-brand-700';
        wrap.innerHTML = `<input type="checkbox" value="${label}" class="filter-cb w-4 h-4 rounded accent-brand-600 cursor-pointer" /> <span>${label}</span>`;
        c.appendChild(wrap);
      });
    }
    renderFilter(MANDATORY_LABELS, 'filterMandatory');
    renderFilter(BENEFITS_LABELS, 'filterBenefit');

    document.querySelectorAll('.filter-cb').forEach(cb => cb.addEventListener('change', () => {
      cb.checked ? selectedFilters.add(cb.value) : selectedFilters.delete(cb.value);
      renderJobs();
    }));
    document.getElementById('clearBtn').addEventListener('click', () => {
      selectedFilters.clear();
      document.querySelectorAll('.filter-cb').forEach(cb => cb.checked = false);
      document.getElementById('searchInput').value = '';
      renderJobs();
    });
    document.getElementById('searchInput').addEventListener('input', renderJobs);

    function tagClass(label) {
      return MANDATORY_LABELS.includes(label)
        ? 'bg-red-50 text-red-600 border border-red-200'
        : 'bg-brand-50 text-brand-700 border border-brand-200';
    }

    function renderJobs() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const filters = [...selectedFilters];
      const session = getSession();
      const myApps = getMyApps();
      const myFavs = getMyFavs();

      const matched = ALL_JOBS.filter(job => {
        const hitText = !q || [job.job, job.company, job.city].join(' ').toLowerCase().includes(q);
        const hitFilter = filters.every(f => activeTags(job).includes(f));
        return hitText && hitFilter;
      });

      const list = document.getElementById('jobList');
      list.innerHTML = '';
      document.getElementById('emptyTip').classList.toggle('hidden', matched.length > 0);
      document.getElementById('resultCount').textContent = `共 ${matched.length} 个正经职位（全国）`;

      matched.forEach(job => {
        const tags = activeTags(job).map(t =>
          `<span class="inline-block text-[11px] px-2 py-0.5 rounded-full mr-1 mb-1 ${tagClass(t)}">${SHORT[t] || t}</span>`).join('');
        const isFav = myFavs.includes(job.id);
        const isApplied = myApps.includes(job.id);
        const canAct = session && session.role === 'seeker';
        const actions = canAct ? `
          <div class="mt-3 flex gap-2">
            <button onclick="event.stopPropagation();doApply('${job.id}')" class="text-xs ${isApplied?'bg-slate-200 text-slate-500':'bg-brand-600 text-white'} rounded-lg px-3 py-1.5 font-medium">${isApplied?'已投递':'投简历'}</button>
            <button onclick="event.stopPropagation();doFav('${job.id}')" class="text-xs border ${isFav?'border-red-300 text-red-500':'border-slate-300 text-slate-500'} rounded-lg px-3 py-1.5 font-medium">${isFav?'★ 已收藏':'☆ 收藏'}</button>
          </div>` : (session && session.role === 'recruiter' ? '' :
          `<div class="mt-3"><a href="login.html" class="text-xs text-brand-600">登录后可投递/收藏 ›</a></div>`);

        const card = document.createElement('div');
        card.className = 'bg-white rounded-2xl shadow-sm border border-slate-200 p-5 hover:shadow-md hover:border-brand-300 transition';
        card.innerHTML = `
          <div class="flex items-start justify-between gap-3">
            <div>
              <h3 class="font-bold text-slate-900 text-lg">${job.job}</h3>
              <p class="text-slate-500 text-sm mt-0.5">${job.company} · ${job.city||'—'}</p>
            </div>
            <span class="text-brand-600 font-bold whitespace-nowrap">${job.salary}</span>
          </div>
          <div class="mt-3 flex flex-wrap">${tags}</div>
          ${actions}`;
        list.appendChild(card);
      });
    }

    async function doApply(id) {
      const r = await applyJob(id);
      if (!r.ok) { alert(r.msg); return; }
      await loadMyState();
      renderJobs();
      alert('投递成功！去「我的-求职中心」可查看记录。');
    }
    async function doFav(id) {
      const r = await toggleFav(id);
      if (!r.ok) { alert(r.msg); return; }
      await loadMyState();
      renderJobs();
    }

    (async () => {
      if (getToken()) await loadMyState();
      ALL_JOBS = await fetchJobs();
      renderJobs();
    })();
  </script>
</body>
</html>
