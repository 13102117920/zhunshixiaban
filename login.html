<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>准时下班 · 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:{50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a'}}}}}</script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <span class="text-2xl">⏰</span>
        <p class="font-extrabold text-brand-700 text-lg leading-none">准时下班</p>
      </a>
      <div id="navRight"></div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-200 p-7">
      <h1 class="text-2xl font-extrabold text-slate-900">登录</h1>
      <p class="text-sm text-slate-500 mt-1">不画饼，不PUA，按时发薪准点走。</p>

      <div class="mt-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">手机号</label>
          <input id="phone" type="tel" inputmode="numeric" maxlength="11" placeholder="11位手机号"
            class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">密码</label>
          <input id="pwd" type="password" placeholder="登录密码"
            class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" />
        </div>
        <p id="err" class="text-sm text-red-500 hidden"></p>
        <button id="loginBtn" class="w-full rounded-xl bg-brand-600 text-white font-bold py-3 hover:bg-brand-700 transition">登录</button>
        <p class="text-center text-sm text-slate-400">还没有账号？<a href="register.html" class="text-brand-600 font-medium">立即注册</a></p>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    renderNav();
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const r = await loginUser(document.getElementById('phone').value, document.getElementById('pwd').value);
      const e = document.getElementById('err');
      if (!r.ok) { e.textContent = r.msg; e.classList.remove('hidden'); return; }
      const role = (getSession() || {}).role;
      location.href = role ? 'dashboard.html' : 'dashboard.html?choose=1';
    });
  </script>
</body>
</html>
